name: Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Upload Velocity plugin
        uses: actions/upload-artifact@v4
        with:
          name: FreshwaterReportV-Velocity
          path: velocity/build/libs/FreshwaterReportV-Velocity-*.jar
          if-no-files-found: error

      - name: Upload Velocity companion plugin
        uses: actions/upload-artifact@v4
        with:
          name: FreshwaterReportV-VelocityCompanion
          path: velocity-companion/build/libs/FreshwaterReportV-VelocityCompanion-*.jar
          if-no-files-found: error

      - name: Upload Waterfall companion plugin
        uses: actions/upload-artifact@v4
        with:
          name: FreshwaterReportV-Companion
          path: waterfall-companion/build/libs/FreshwaterReportV-Companion-*.jar
          if-no-files-found: error

      - name: Publish stable Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            velocity/build/libs/FreshwaterReportV-Velocity-*.jar
            velocity-companion/build/libs/FreshwaterReportV-VelocityCompanion-*.jar
            waterfall-companion/build/libs/FreshwaterReportV-Companion-*.jar
          generate_release_notes: true

      - name: Publish latest build Release (on main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "最新构建 (build #${{ github.run_number }})"
          body: "由提交 ${{ github.sha }} 自动构建的最新插件 jar。"
          prerelease: true
          files: |
            velocity/build/libs/FreshwaterReportV-Velocity-*.jar
            velocity-companion/build/libs/FreshwaterReportV-VelocityCompanion-*.jar
            waterfall-companion/build/libs/FreshwaterReportV-Companion-*.jar
